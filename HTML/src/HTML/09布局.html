<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body style="background-color: cadetblue">
<!--
      css 设置样式的
          通过元素的style属性进行设置
          style="样式名:样式值; ....."
      块元素  自己独占一行
            div
      行内元素  不会独占一行
            span


-->

<div style="border: 1px solid red;width: 500px;height: 200px;margin: 10px auto;background-color: #f3cb89">
    123
</div>
<div style="border: 1px solid red;width: 500px;height: 200px;margin: 10px auto;background-color: #ff8585">
    456
</div>
<div style="border: 1px solid red;width: 500px;height: 200px;margin: 10px auto;background-color: #da70ad">
    随着<span style="font-size: 30px;color: rebeccapurple;font-weight: bold">匈牙利</span>国会选举尘埃落定，连续执政16年的欧尔班遭遇重挫。
</div>
<span style="border: 1px solid #ffffff;width: 500px;height: 200px;">555</span>
</body>
</html>
