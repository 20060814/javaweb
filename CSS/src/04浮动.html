<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
  <style>
      .outerDiv{
          width: 500px;
          height: 400px;
          border: 1px solid: lightseagreen;
          margin: 0px auto;
          background-color: dodgerblue;
      }
      .innerDiv{
          width: 100px;
          height: 100px;
          border: 1px solid yellow;
/*          display: inline;*//*(block 块 inline 行内)*/
      }
      .d1{
          background-color: greenyellow;
          float: left;
      }
      .d2{
          background-color: green;
      }
      .d3{
          background-color: sandybrown;
      }

  </style>
</head>
<body>
    <div class="outerDiv">
      <div class="innerDiv d1" >star1</div>
      <div class="innerDiv d2" >star2</div>
      <div class="innerDiv d3" >star3</div>
    </div>


</body>
</html>
